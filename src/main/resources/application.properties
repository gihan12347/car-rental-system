spring.application.name=car-rental-dashboard
# Local default 8082; Railway sets PORT (Dockerfile passes --server.port=${PORT})
server.port=${PORT:8082}

# --- MySQL (local) ---
# Create the database first:  CREATE DATABASE `car-rental-system` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
# Optional env overrides: MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/car-rental-system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.thymeleaf.cache=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=10MB

# Local: uploads/cars — Railway: mount a volume at /data and set APP_UPLOAD_CARS_DIR=/data/uploads/cars
app.upload.cars.dir=${APP_UPLOAD_CARS_DIR:uploads/cars}

# Default sign-in (created on first run if no users exist)
app.security.default-username=admin
app.security.default-password=admin
