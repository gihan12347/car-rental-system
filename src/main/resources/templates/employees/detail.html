<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:with="pageTitle=${employee.name + ' · Payments'}">
<head th:replace="~{fragments/head :: commonHead}"></head>
<body class="app-body employees-page">
<div class="d-flex min-vh-100 app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{fragments/nav-offcanvas :: navOffcanvas}"></div>
    <div class="app-content flex-grow-1 overflow-auto d-flex flex-column">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        <main class="container-fluid py-3 py-lg-4 px-3 px-lg-5 flex-grow-1 app-main">
            <div th:if="${successMessage}" class="alert app-alert alert-success d-flex align-items-center gap-2">
                <i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert app-alert alert-danger d-flex align-items-center gap-2">
                <i class="bi bi-exclamation-circle-fill"></i><span th:text="${errorMessage}"></span>
            </div>

            <header class="app-page-header app-page-header--toolbar mb-2">
                <a class="small text-decoration-none text-muted d-inline-flex align-items-center gap-1 mb-2"
                   th:href="@{/employees(tab='employees')}">
                    <i class="bi bi-arrow-left"></i> Back to employees
                </a>
                <div class="d-flex flex-column flex-lg-row align-items-lg-end justify-content-between gap-2 gap-lg-3">
                    <div class="min-w-0">
                        <h1 class="h2 mb-1">Employee payments</h1>
                        <p class="lead mb-0">
                            <span th:text="${employee.name}">Employee</span>
                            <span class="text-muted"> · NIC </span>
                            <span class="fw-semibold" th:text="${employee.nic}"></span>
                        </p>
                        <div class="d-flex flex-wrap gap-2 align-items-center mt-1">
                            <span class="badge badge-status"
                                  th:classappend="${employee.status.name() == 'PERMANENT'} ? ' text-bg-success' : (${employee.status.name() == 'CONTRACT'} ? ' text-bg-info' : ' text-bg-secondary')"
                                  th:text="${employee.status}"></span>
                            <span class="small text-muted">Started: <span th:text="${employee.jobStartDate}"></span></span>
                        </div>
                    </div>
                    <div class="app-page-header__actions">
                        <div class="app-toolbar-card employee-mobile-toolbar">
                            <div class="app-toolbar-card__period">
                                <div th:replace="~{fragments/period-filter :: simple(
                                    @{'/employees/' + ${employee.id}},
                                    ${paymentPeriods},
                                    ${paymentPeriod},
                                    null,
                                    null,
                                    'paymentPage',
                                    'employeeDetailPeriod'
                                )}"></div>
                            </div>
                            <button type="button"
                                    class="btn btn-app-primary d-inline-flex align-items-center gap-2 flex-shrink-0"
                                    data-bs-toggle="modal" data-bs-target="#paymentModal"
                                    onclick="prepareNewPaymentForEmployee()">
                                <i class="bi bi-plus-lg" aria-hidden="true"></i>
                                <span>Add payment</span>
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="employee-subtoolbar d-flex flex-column flex-md-row align-items-stretch align-items-md-center gap-2 mb-3">
                <div class="employees-activity-bar employees-activity-bar--compact employee-mobile-btn-set employee-mobile-btn-set--nav flex-grow-1 mb-0" role="navigation" aria-label="Employee actions">
                    <a class="employees-activity-bar__btn employees-activity-bar__btn--active"
                       th:href="@{/employees/{id}(id=${employee.id}, period=${paymentPeriod})}">
                        <i class="bi bi-wallet2" aria-hidden="true"></i>
                        <span>Payments</span>
                    </a>
                    <a class="employees-activity-bar__btn"
                       th:href="@{/employees/{id}/rentals(id=${employee.id}, period=${paymentPeriod})}">
                        <i class="bi bi-car-front" aria-hidden="true"></i>
                        <span>Activity</span>
                        <span class="employees-activity-bar__count" th:if="${hireCount > 0}" th:text="${hireCount}">0</span>
                    </a>
                    <a class="employees-activity-bar__btn"
                       th:href="@{/employees/{id}/edit(id=${employee.id})}">
                        <i class="bi bi-pencil" aria-hidden="true"></i>
                        <span>Edit</span>
                    </a>
                </div>
                <div class="employee-subtoolbar__metrics d-flex flex-wrap gap-2">
                <div class="stat-card p-2 px-3 employee-subtoolbar__metric flex-shrink-0">
                    <div class="d-flex align-items-center gap-2">
                        <div class="stat-icon indigo employee-subtoolbar__metric-icon" aria-hidden="true">
                            <i class="bi bi-wallet2"></i>
                        </div>
                        <div>
                            <div class="stat-label mb-0">Total paid</div>
                            <div class="stat-value stat-value--module mb-0"
                                 th:text="${#numbers.formatDecimal(totalPaid, 1, 'COMMA', 2, 'POINT')}">0</div>
                        </div>
                    </div>
                </div>
                <div class="stat-card p-2 px-3 employee-subtoolbar__metric flex-shrink-0">
                    <div class="d-flex align-items-center gap-2">
                        <div class="stat-icon emerald employee-subtoolbar__metric-icon" aria-hidden="true">
                            <i class="bi bi-receipt"></i>
                        </div>
                        <div>
                            <div class="stat-label mb-0">Payments in period</div>
                            <div class="stat-value stat-value--module mb-0"
                                 th:text="${paymentsPage != null ? paymentsPage.totalElements : 0}">0</div>
                        </div>
                    </div>
                </div>
                </div>
            </div>

            <section class="app-list-panel mb-0" aria-label="Payment history">
                <div class="app-list-panel__toolbar app-list-panel__toolbar--single">
                    <span class="app-period-chip" th:if="${paymentPeriodLabel != null}">
                        <i class="bi bi-calendar3" aria-hidden="true"></i>
                        <span th:text="${paymentPeriodLabel}">Period</span>
                    </span>
                </div>

                <div th:replace="~{fragments/record-lists :: employeePaymentDetailRecordList(${payments}, ${employee}, ${paymentPeriod}, ${paymentFrom}, ${paymentTo}, ${paymentsPage})}"></div>

                <div class="app-card-table app-card-table--flush border-0 shadow-none rounded-0 mb-0 d-none d-xl-block"
                     th:if="${paymentsPage != null and paymentsPage.totalElements > 0}">
                    <div class="table-responsive">
                        <table class="table app-table mb-0 align-middle">
                            <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th class="text-end">Amount</th>
                                <th class="text-end fleet-table-actions-col">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="p : ${payments}">
                                <td class="text-nowrap" th:text="${p.paymentDate}"></td>
                                <td><span class="badge bg-light text-dark border" th:text="${p.paymentType}"></span></td>
                                <td class="text-end fw-semibold"
                                    th:text="${#numbers.formatDecimal(p.paymentValue, 1, 'COMMA', 2, 'POINT')}"></td>
                                <td class="text-end fleet-table-actions-col">
                                    <div class="fleet-table-actions">
                                        <a class="fleet-table-actions__btn fleet-table-actions__btn--edit"
                                           th:href="@{/employees/payments/{id}/edit(id=${p.id}, returnEmployeeId=${employee.id}, period=${paymentPeriod}, paymentPage=${paymentsPage.number}, from=${paymentFrom}, to=${paymentTo})}">Edit</a>
                                        <span class="app-confirm-delete-trigger d-inline">
                                            <button type="button"
                                                    class="fleet-table-actions__btn fleet-table-actions__btn--edit text-danger border-danger"
                                                    data-app-confirm
                                                    data-bs-toggle="modal"
                                                    data-bs-target="#appConfirmDeleteModal"
                                                    data-app-confirm-title="Delete payment"
                                                    data-app-confirm-message="Delete this payment record? This cannot be undone."
                                                    th:attr="data-app-confirm-action=@{/employees/payments/{id}/delete(id=${p.id})},
                                                             data-app-confirm-loading='Removing payment…'">
                                                Delete
                                            </button>
                                            <template class="app-confirm-extra-fields">
                                                <input type="hidden" name="returnEmployeeId" th:value="${employee.id}"/>
                                                <input type="hidden" name="period" th:value="${paymentPeriod}"/>
                                                <input type="hidden" name="paymentPage" th:value="${paymentsPage.number}"/>
                                                <input type="hidden" name="from" th:if="${paymentFrom != null}" th:value="${paymentFrom}"/>
                                                <input type="hidden" name="to" th:if="${paymentTo != null}" th:value="${paymentTo}"/>
                                            </template>
                                        </span>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="app-list-panel__footer"
                     th:if="${paymentsPage != null and paymentsPage.totalElements > 0}">
                    <div th:replace="~{fragments/employee-payment-toolbar :: pagination(${paymentsPage}, ${employee.id}, ${paymentPeriod}, ${paymentFrom}, ${paymentTo}, null, null)}"></div>
                </div>

                <div class="app-list-panel__empty empty-state"
                     th:if="${paymentsPage == null or paymentsPage.totalElements == 0}">
                    <i class="bi bi-wallet2" aria-hidden="true"></i>
                    <p class="fw-semibold mb-1">No payments yet</p>
                    <p class="small text-muted mb-3">Record salary, bonus, or other payments for this employee.</p>
                    <button type="button" class="btn btn-app-primary" data-bs-toggle="modal" data-bs-target="#paymentModal"
                            onclick="prepareNewPaymentForEmployee()">Add payment</button>
                </div>
            </section>
        </main>
    </div>
</div>

<div class="modal fade" id="paymentModal" tabindex="-1" aria-labelledby="paymentModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content app-modal">
            <div class="modal-header app-modal-header">
                <h5 class="modal-title" id="paymentModalLabel"
                    th:text="${paymentForm.id != null} ? 'Edit payment' : 'Add payment'">Add payment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="paymentFormEl" method="post" novalidate
                  th:action="${paymentForm.id != null} ? @{/employees/payments/{id}(id=${paymentForm.id})} : @{/employees/payments}"
                  th:attr="data-create-action=@{/employees/payments}"
                  th:object="${paymentForm}">
                <th:block th:replace="~{fragments/csrf :: csrfField}"></th:block>
                <input type="hidden" name="returnEmployeeId" th:value="${employee.id}"/>
                <input type="hidden" name="period" th:value="${paymentPeriod}"/>
                <input type="hidden" name="paymentPage" th:value="${paymentsPage != null ? paymentsPage.number : 0}"/>
                <input type="hidden" name="from" th:if="${paymentFrom != null}" th:value="${paymentFrom}"/>
                <input type="hidden" name="to" th:if="${paymentTo != null}" th:value="${paymentTo}"/>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Employee</label>
                        <p class="form-control-plaintext fw-semibold mb-0" th:text="|${employee.name} (${employee.nic})|"></p>
                        <input type="hidden" th:field="*{employeeId}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold" for="pay-type">Payment type</label>
                        <select class="form-select" id="pay-type" required th:field="*{paymentType}">
                            <option th:each="t : ${paymentTypes}" th:value="${t.name()}" th:text="${t.name()}"></option>
                        </select>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold" for="pay-value">Amount</label>
                            <input class="form-control" id="pay-value" type="number" step="0.01" min="0" required th:field="*{paymentValue}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold" for="pay-date">Payment date</label>
                            <input class="form-control" id="pay-date" type="date" required th:field="*{paymentDate}"/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-soft" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-app-primary">Save payment</button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block th:if="${openPaymentModal == true}">
    <script>document.addEventListener('DOMContentLoaded',function(){var el=document.getElementById('paymentModal');if(el)bootstrap.Modal.getOrCreateInstance(el).show();});</script>
</th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/employees.js}" defer></script>
<div th:replace="~{fragments/modals :: appModals}"></div>
</body>
</html>
