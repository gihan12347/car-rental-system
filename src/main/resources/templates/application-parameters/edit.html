<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:with="pageTitle='Edit parameter'">
<head th:replace="~{fragments/head :: commonHead}"></head>
<body class="app-body application-parameters-page">
<div class="d-flex min-vh-100 app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{fragments/nav-offcanvas :: navOffcanvas}"></div>
    <div class="app-content flex-grow-1 overflow-auto d-flex flex-column">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        <main class="container-fluid py-3 py-lg-4 px-3 px-lg-5 flex-grow-1 app-main app-main--narrow">
            <div th:if="${errorMessage}" class="alert app-alert alert-danger d-flex align-items-center gap-2">
                <i class="bi bi-exclamation-circle-fill"></i><span th:text="${errorMessage}"></span>
            </div>

            <header class="app-page-header mb-4">
                <h1 class="h2 mb-1">Edit parameter</h1>
                <p class="lead mb-0 text-muted">Update the value and visibility for this application setting.</p>
            </header>

            <form class="app-form-card p-4 p-lg-5"
                  th:action="@{/application-parameters/{code}(code=${parameterForm.code})}"
                  th:object="${parameterForm}" method="post" novalidate>
                <th:block th:replace="~{fragments/csrf :: csrfField}"></th:block>

                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label" for="parameterCode">Code</label>
                        <input class="form-control font-monospace" id="parameterCode" th:field="*{code}" readonly/>
                        <div class="form-text">Parameter code cannot be changed.</div>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="parameterDescription">Description</label>
                        <input class="form-control" id="parameterDescription" th:field="*{description}" required/>
                        <div class="invalid-feedback d-block small" th:if="${#fields.hasErrors('description')}"
                             th:errors="*{description}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="parameterValue">Value</label>
                        <input class="form-control font-monospace" id="parameterValue" th:field="*{value}" required/>
                        <div class="form-text">Stored as text; numeric parameters must be whole numbers.</div>
                        <div class="invalid-feedback d-block small" th:if="${#fields.hasErrors('value')}"
                             th:errors="*{value}"></div>
                    </div>
                </div>

                <div class="d-flex flex-wrap gap-2 mt-4 pt-2 border-top">
                    <button type="submit" class="btn btn-primary">Save changes</button>
                    <a class="btn btn-outline-secondary" th:href="@{/application-parameters}">Cancel</a>
                </div>
            </form>
        </main>
    </div>
</div>
</body>
</html>
