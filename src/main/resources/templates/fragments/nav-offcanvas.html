<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="navOffcanvas" class="offcanvas offcanvas-start app-offcanvas text-white" tabindex="-1"
     id="appNavOffcanvas" aria-labelledby="appNavOffcanvasLabel">
    <div class="offcanvas-header border-bottom border-secondary border-opacity-25">
        <h5 class="offcanvas-title fw-bold" id="appNavOffcanvasLabel">FleetDesk</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column p-0 overflow-hidden">
        <div class="app-sidebar-nav-scroll" role="region" aria-label="Main navigation">
        <nav class="nav flex-column px-2 py-3 gap-1">
            <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
               th:classappend="${activeNav == 'home'} ? ' active' : ''"
               th:href="@{/dashboard}">
                <i class="bi bi-house-door"></i><span>Home</span>
            </a>
            <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
               th:classappend="${activeNav == 'cars'} ? ' active' : ''"
               th:href="@{/cars}">
                <i class="bi bi-car-front"></i><span>Fleet</span>
            </a>
            <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
               th:classappend="${activeNav == 'rentals'} ? ' active' : ''"
               th:href="@{/rentals}">
                <i class="bi bi-calendar3"></i><span>All rentals</span>
            </a>
            <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
               th:classappend="${activeNav == 'overdue'} ? ' active' : ''"
               th:href="@{/rentals/overdue}">
                <i class="bi bi-alarm"></i>
                <span class="flex-grow-1">Overdue rentals</span>
                <span class="badge rounded-pill text-bg-danger"
                      th:if="${session.rentalOverdueCount != null and session.rentalOverdueCount > 0}"
                      th:text="${session.rentalOverdueCount}">0</span>
            </a>
            <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
               th:classappend="${activeNav == 'service-overdue'} ? ' active' : ''"
               th:href="@{/cars/service-overdue}">
                <i class="bi bi-wrench-adjustable"></i>
                <span class="flex-grow-1">Service overdue</span>
                <span class="badge rounded-pill text-bg-danger"
                      th:if="${session.serviceOverdueCount != null and session.serviceOverdueCount > 0}"
                      th:text="${session.serviceOverdueCount}">0</span>
            </a>
            <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
               th:classappend="${activeNav == 'active'} ? ' active' : ''"
               th:href="@{/rentals/active}">
                <i class="bi bi-lightning-charge"></i><span>Active rentals</span>
            </a>
            <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
               th:classappend="${activeNav == 'employees'} ? ' active' : ''"
               th:href="@{/employees}"
               th:if="${session.USER_ROLE == 'ROLE_ADMIN'}">
                <i class="bi bi-people"></i><span>Employees</span>
            </a>
            <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
               th:classappend="${activeNav == 'office-expenses'} ? ' active' : ''"
               th:href="@{/office-expenses}"
               th:if="${session.USER_ROLE == 'ROLE_ADMIN'}">
                <i class="bi bi-building"></i><span>Office expenses</span>
            </a>
            <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
               th:classappend="${activeNav == 'account'} ? ' active' : ''"
               th:href="@{/account}">
                <i class="bi bi-person-gear"></i><span>Account</span>
            </a>
        </nav>
        </div>
        <div th:replace="~{fragments/sidebar-quick-actions :: quickActionsOffcanvas}"></div>
        <div class="app-sidebar-footer px-3 pb-4 pt-3 border-top border-secondary border-opacity-25">
            <p class="small text-white-50 mb-0" sec:authorize="isAuthenticated()">
                Signed in as <span class="text-white" sec:authentication="name">user</span>
            </p>
        </div>
    </div>
</div>
</body>
</html>
