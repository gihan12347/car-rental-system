<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="rentalsTable(rentals, rentalsPage, showEmployeeColumn, employeeId, listTab, q, period, flush)"
     th:if="${rentalsPage != null and rentalsPage.totalElements > 0}">
    <div th:replace="~{fragments/record-lists :: employeeRentalRecordList(${rentals}, ${showEmployeeColumn})}"></div>
    <div th:class="${flush} ? 'app-card-table app-card-table--flush border-0 shadow-none rounded-0 mb-0 d-none d-xl-block' : 'app-card-table employee-rentals-table d-none d-xl-block'">
    <div class="table-responsive">
        <table class="table app-table mb-0 align-middle">
            <thead>
            <tr>
                <th>Vehicle</th>
                <th th:if="${showEmployeeColumn}">Employee</th>
                <th>Customer</th>
                <th>Period</th>
                <th>Status</th>
                <th class="text-end">Total</th>
                <th class="text-end fleet-table-actions-col">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${rentals}">
                <td class="fw-semibold text-nowrap">
                    <span th:text="${r.car.registrationNumber}">—</span>
                    <span class="badge bg-info-subtle text-info border border-info-subtle ms-1"
                          title="Zero-charge employee hire">Staff</span>
                </td>
                <td th:if="${showEmployeeColumn}">
                    <a th:if="${r.employee != null}"
                       class="text-decoration-none fw-semibold"
                       th:href="@{/employees/{id}(id=${r.employee.id})}"
                       th:text="${r.employee.name}">—</a>
                    <span th:if="${r.employee == null}" class="text-muted small"
                          th:text="${r.customerIdNumber}">—</span>
                </td>
                <td>
                    <span class="d-block fw-semibold" th:text="${r.customerName}">—</span>
                    <span class="small text-muted" th:text="|NIC: ${r.customerIdNumber}|"></span>
                </td>
                <td class="text-nowrap small">
                    <span th:text="${r.pickupDate}"></span>
                    <span class="text-muted"> → </span>
                    <span th:text="${r.returnDate != null ? r.returnDate : '—'}"></span>
                </td>
                <td>
                    <span class="badge badge-status"
                          th:classappend="${r.rentalStatus.name() == 'ACTIVE'} ? ' text-bg-primary' : (${r.rentalStatus.name() == 'COMPLETED'} ? ' text-bg-success' : ' text-bg-secondary')"
                          th:text="${r.rentalStatus}"></span>
                </td>
                <td class="text-end fw-semibold text-success">
                    <span th:if="${r.totalPrice != null}"
                          th:text="${#numbers.formatDecimal(r.totalPrice, 1, 'COMMA', 2, 'POINT')}">0.00</span>
                    <span th:if="${r.totalPrice == null}" class="text-muted">—</span>
                </td>
                <td class="text-end fleet-table-actions-col">
                    <div class="fleet-table-actions">
                        <a th:if="${r.rentalStatus.name() == 'ACTIVE'}"
                           class="fleet-table-actions__btn fleet-table-actions__btn--complete"
                           th:href="@{/rentals/{id}/complete(id=${r.id})}">Complete</a>
                        <a class="fleet-table-actions__btn fleet-table-actions__btn--edit"
                           th:href="@{/rentals(q=${r.car.registrationNumber})}">View</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    </div>
</div>

<nav th:fragment="rentalsPagination(rentalsPage, employeeId, listTab, q, period, flush)"
     class="app-pagination-wrap"
     th:classappend="${flush != null and flush} ? '' : ' mt-3'"
     th:if="${rentalsPage != null and rentalsPage.totalElements > 0}"
     aria-label="Employee rentals pagination">
    <p class="app-pagination-summary small text-muted mb-2 mb-md-0">
        Showing
        <span class="fw-semibold text-body" th:text="${rentalsPage.number * rentalsPage.size + 1}">1</span>–
        <span class="fw-semibold text-body"
              th:text="${rentalsPage.number * rentalsPage.size + rentalsPage.numberOfElements}">10</span>
        of
        <span class="fw-semibold text-body" th:text="${rentalsPage.totalElements}">0</span>
    </p>
    <ul class="pagination pagination-sm app-pagination__list mb-0"
        th:if="${rentalsPage.totalPages > 1}">
        <li class="page-item" th:classappend="${rentalsPage.first} ? 'disabled'">
            <a class="page-link" th:if="${!rentalsPage.first and employeeId != null}"
               th:href="@{/employees/{eid}/rentals(eid=${employeeId}, rentalPage=${rentalsPage.number - 1}, q=${q}, period=${period})}"
               aria-label="Previous page">
                <i class="bi bi-chevron-left"></i>
            </a>
            <a class="page-link" th:if="${!rentalsPage.first and employeeId == null}"
               th:href="@{/employees(tab=${listTab}, rentalPage=${rentalsPage.number - 1}, q=${q}, period=${period})}"
               aria-label="Previous page">
                <i class="bi bi-chevron-left"></i>
            </a>
        </li>
        <li class="page-item" th:each="pageNum : ${#numbers.sequence(0, rentalsPage.totalPages - 1)}"
            th:classappend="${pageNum == rentalsPage.number} ? 'active'">
            <a class="page-link" th:if="${employeeId != null}"
               th:href="@{/employees/{eid}/rentals(eid=${employeeId}, rentalPage=${pageNum}, q=${q}, period=${period})}"
               th:text="${pageNum + 1}"
               th:attr="aria-current=${pageNum == rentalsPage.number} ? 'page' : null"></a>
            <a class="page-link" th:if="${employeeId == null}"
               th:href="@{/employees(tab=${listTab}, rentalPage=${pageNum}, q=${q}, period=${period})}"
               th:text="${pageNum + 1}"
               th:attr="aria-current=${pageNum == rentalsPage.number} ? 'page' : null"></a>
        </li>
        <li class="page-item" th:classappend="${rentalsPage.last} ? 'disabled'">
            <a class="page-link" th:if="${!rentalsPage.last and employeeId != null}"
               th:href="@{/employees/{eid}/rentals(eid=${employeeId}, rentalPage=${rentalsPage.number + 1}, q=${q}, period=${period})}"
               aria-label="Next page">
                <i class="bi bi-chevron-right"></i>
            </a>
            <a class="page-link" th:if="${!rentalsPage.last and employeeId == null}"
               th:href="@{/employees(tab=${listTab}, rentalPage=${rentalsPage.number + 1}, q=${q}, period=${period})}"
               aria-label="Next page">
                <i class="bi bi-chevron-right"></i>
            </a>
        </li>
    </ul>
</nav>

<div th:fragment="rentalsEmpty(flush)"
     th:class="${flush} ? 'app-list-panel__empty empty-state' : 'app-card-table empty-state'"
     th:if="${rentalsPage == null or rentalsPage.totalElements == 0}">
    <i class="bi bi-car-front" aria-hidden="true"></i>
    <p class="fw-semibold mb-1">No employee vehicle hires</p>
    <p class="small text-muted mb-0">Hires booked with an employee NIC are recorded here with zero charge.</p>
</div>
</body>
</html>
