<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<aside th:fragment="sidebar"
       class="app-sidebar d-none d-lg-flex flex-column flex-shrink-0 text-white">
    <div class="px-3 py-4 border-bottom border-secondary border-opacity-25">
        <a th:href="@{/dashboard}" class="d-flex align-items-center gap-2 text-white text-decoration-none">
            <span class="d-inline-flex align-items-center justify-content-center rounded-3 bg-primary bg-opacity-25 text-white" style="width: 40px; height: 40px;">
                <i class="bi bi-speedometer2 fs-5"></i>
            </span>
            <span>
                <span class="d-block fw-bold lh-sm" style="letter-spacing: -0.02em;">FleetDesk</span>
                <span class="small text-white-50" style="font-size: 0.72rem;">Car rental</span>
            </span>
        </a>
    </div>
    <nav class="nav flex-column px-2 py-3 gap-1">
        <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
           th:classappend="${activeNav == 'home'} ? ' active' : ''"
           th:href="@{/dashboard}">
            <i class="bi bi-house-door"></i><span>Home</span>
        </a>
        <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
           th:classappend="${activeNav == 'cars'} ? ' active' : ''"
           th:href="@{/cars}">
            <i class="bi bi-car-front"></i><span>Fleet</span>
        </a>
        <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
           th:classappend="${activeNav == 'rentals'} ? ' active' : ''"
           th:href="@{/rentals}">
            <i class="bi bi-calendar3"></i><span>All rentals</span>
        </a>
        <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
           th:classappend="${activeNav == 'active'} ? ' active' : ''"
           th:href="@{/rentals/active}">
            <i class="bi bi-lightning-charge"></i><span>Active rentals</span>
        </a>
        <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
           th:classappend="${activeNav == 'overdue'} ? ' active' : ''"
           th:href="@{/rentals/overdue}">
            <i class="bi bi-alarm"></i><span>Overdue rentals</span>
        </a>
        <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
           th:classappend="${activeNav == 'service-overdue'} ? ' active' : ''"
           th:href="@{/cars/service-overdue}">
            <i class="bi bi-wrench-adjustable"></i>
            <span class="flex-grow-1">Service overdue</span>
            <span class="badge rounded-pill text-bg-danger"
                  th:if="${serviceOverdueCount > 0}"
                  th:text="${serviceOverdueCount}">0</span>
        </a>
        <a class="app-nav-link nav-link d-flex align-items-center gap-2 rounded-3"
           th:classappend="${activeNav == 'account'} ? ' active' : ''"
           th:href="@{/account}">
            <i class="bi bi-person-gear"></i><span>Account</span>
        </a>
    </nav>
    <div th:replace="~{fragments/sidebar-quick-actions :: quickActions}"></div>
    <div class="app-sidebar-footer px-3 pb-4 pt-3 mt-auto border-top border-secondary border-opacity-25">
        <p class="small text-white-50 mb-0 text-truncate" sec:authorize="isAuthenticated()">
            Signed in as <span class="text-white" sec:authentication="name">user</span>
        </p>
    </div>
</aside>
</body>
</html>
