<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="rentalsPagination(pagedResult, searchQuery)"
     class="app-pagination"
     th:if="${pagedResult != null and pagedResult.totalElements > 0}">
    <p class="app-pagination-summary small text-muted mb-2 mb-md-0">
        Showing
        <span class="fw-semibold text-body" th:text="${pagedResult.number * pagedResult.size + 1}">1</span>–
        <span class="fw-semibold text-body"
              th:text="${pagedResult.number * pagedResult.size + pagedResult.numberOfElements}">10</span>
        of
        <span class="fw-semibold text-body" th:text="${pagedResult.totalElements}">0</span>
    </p>
    <nav th:if="${pagedResult.totalPages > 1}" aria-label="Page navigation">
        <ul class="pagination pagination-sm app-pagination__list mb-0">
            <li class="page-item" th:classappend="${pagedResult.first} ? 'disabled'">
                <a class="page-link"
                   th:if="${!pagedResult.first}"
                   th:href="@{/rentals(page=${pagedResult.number - 1}, size=${pagedResult.size}, q=${searchQuery})}"
                   aria-label="Previous page">
                    <i class="bi bi-chevron-left"></i>
                    <span class="d-none d-sm-inline ms-1">Previous</span>
                </a>
                <span class="page-link" th:if="${pagedResult.first}" aria-hidden="true">
                    <i class="bi bi-chevron-left"></i>
                    <span class="d-none d-sm-inline ms-1">Previous</span>
                </span>
            </li>
            <li class="page-item"
                th:each="pageIndex : ${#numbers.sequence(0, pagedResult.totalPages - 1)}"
                th:classappend="${pageIndex == pagedResult.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/rentals(page=${pageIndex}, size=${pagedResult.size}, q=${searchQuery})}"
                   th:text="${pageIndex + 1}"
                   th:attr="aria-current=${pageIndex == pagedResult.number} ? 'page' : null">1</a>
            </li>
            <li class="page-item" th:classappend="${pagedResult.last} ? 'disabled'">
                <a class="page-link"
                   th:if="${!pagedResult.last}"
                   th:href="@{/rentals(page=${pagedResult.number + 1}, size=${pagedResult.size}, q=${searchQuery})}"
                   aria-label="Next page">
                    <span class="d-none d-sm-inline me-1">Next</span>
                    <i class="bi bi-chevron-right"></i>
                </a>
                <span class="page-link" th:if="${pagedResult.last}" aria-hidden="true">
                    <span class="d-none d-sm-inline me-1">Next</span>
                    <i class="bi bi-chevron-right"></i>
                </span>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
