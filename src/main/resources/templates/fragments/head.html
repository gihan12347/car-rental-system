<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Usage: <html th:with="pageTitle='My page'"><head th:replace="~{fragments/head :: commonHead}"></head> -->
<head th:fragment="commonHead">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta name="fleetdesk-dashboard-url" th:content="@{/dashboard}"/>
    <meta name="fleetdesk-login-url" th:content="@{/login}"/>
    <meta name="fleetdesk-auth-status-url" th:content="@{/api/auth/status}"/>
    <!-- PWA / install as standalone app from Chrome; icons match desktop taskbar -->
    <link rel="manifest" th:href="@{/site.webmanifest}"/>
    <link rel="icon" th:href="@{/favicon.ico}" sizes="any"/>
    <link rel="shortcut icon" th:href="@{/favicon.ico}"/>
    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/icons/icon-192.png}"/>
    <link rel="icon" type="image/png" sizes="512x512" th:href="@{/icons/icon-512.png}"/>
    <link rel="icon" type="image/png" sizes="48x48" th:href="@{/icons/favicon-48.png}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/icons/favicon-32.png}"/>
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/icons/favicon-16.png}"/>
    <meta name="theme-color" content="#dc2626"/>
    <meta name="msapplication-TileColor" content="#4f46e5"/>
    <meta name="msapplication-TileImage" th:content="@{/icons/icon-192.png}"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="FleetDesk"/>
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}"/>
    <title th:text="${pageTitle != null} ? (${pageTitle} + ' · FleetDesk') : 'FleetDesk'">FleetDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
    <script th:inline="javascript">
        /*<![CDATA[*/
        window.FleetDeskLoading = {
            logoUrl: /*[[@{/images/loading-logo.png}]]*/ '/images/loading-logo.png'
        };
        /*]]>*/
    </script>
    <script th:src="@{/js/loading-curtain.js}" defer=""></script>
    <script th:src="@{/js/time-ampm-picker.js}" defer=""></script>
    <script th:src="@{/js/auth-session-guard.js}" defer=""></script>
    <script th:inline="javascript" defer="">
        /*<![CDATA[*/
        (function () {
            if (!('serviceWorker' in navigator)) return;
            window.addEventListener('load', function () {
                var url = /*[[@{/sw.js}]]*/ '/sw.js';
                navigator.serviceWorker.register(url, { scope: '/' }).catch(function (err) {
                    console.warn('FleetDesk service worker registration failed:', err);
                });
            });
        })();
        /*]]>*/
    </script>
</head>
</html>
