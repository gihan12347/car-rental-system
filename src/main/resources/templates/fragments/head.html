<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Usage: <html th:with="pageTitle='My page'"><head th:replace="~{fragments/head :: commonHead}"></head> -->
<head th:fragment="commonHead">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <!-- PWA / install as standalone app from Chrome -->
    <link rel="manifest" th:href="@{/site.webmanifest}"/>
    <link rel="icon" th:href="@{/icons/favicon.ico}" sizes="any"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/icons/favicon-32.png}"/>
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/icons/favicon-16.png}"/>
    <meta name="theme-color" content="#4f46e5"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="FleetDesk"/>
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}"/>
    <title th:text="${pageTitle != null} ? (${pageTitle} + ' · FleetDesk') : 'FleetDesk'">FleetDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
    <script th:inline="javascript" defer="">
        /*<![CDATA[*/
        (function () {
            if (!('serviceWorker' in navigator)) return;
            window.addEventListener('load', function () {
                var url = /*[[@{/sw.js}]]*/ '/sw.js';
                navigator.serviceWorker.register(url).catch(function () { });
            });
        })();
        /*]]>*/
    </script>
</head>
</html>
