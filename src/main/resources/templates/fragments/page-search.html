<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="pageSearch(searchAction, placeholder)" class="app-page-search" aria-label="Search">
    <form th:action="${searchAction}" method="get" class="app-page-search-form" role="search">
        <label class="visually-hidden" for="appPageSearchInput" th:text="${placeholder}">Search</label>
        <div class="app-page-search-bar">
            <span class="app-page-search-leading" aria-hidden="true">
                <i class="bi bi-search"></i>
            </span>
            <input type="search"
                   id="appPageSearchInput"
                   name="q"
                   class="app-page-search-input"
                   th:value="${searchQuery}"
                   th:placeholder="${placeholder}"
                   autocomplete="off"
                   enterkeyhint="search"/>
            <button type="submit" class="app-page-search-submit">
                <span class="app-page-search-submit-text">Search</span>
                <i class="bi bi-arrow-right app-page-search-submit-icon" aria-hidden="true"></i>
            </button>
            <a th:if="${searchQuery != null and !#strings.isEmpty(searchQuery)}"
               th:href="${searchAction}"
               class="app-page-search-clear"
               title="Clear search"
               aria-label="Clear search">
                <i class="bi bi-x-lg" aria-hidden="true"></i>
            </a>
        </div>
    </form>
    <div th:if="${searchQuery != null and !#strings.isEmpty(searchQuery)}"
         class="app-page-search-meta">
        <span class="app-page-search-chip">
            <i class="bi bi-funnel" aria-hidden="true"></i>
            <span th:text="${searchQuery}">query</span>
        </span>
        <a th:href="${searchAction}" class="app-page-search-meta-clear">Clear filter</a>
    </div>
</section>
</body>
</html>
