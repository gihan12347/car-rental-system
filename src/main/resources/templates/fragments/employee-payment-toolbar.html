<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<body>

<nav th:fragment="pagination(paymentsPage, employeeId, period, from, to, q, tab)"

     class="app-pagination-wrap mt-3"

     th:if="${paymentsPage != null and paymentsPage.totalElements > 0}"

     aria-label="Payments pagination">

    <p class="app-pagination-summary small text-muted mb-2 mb-md-0">

        Showing

        <span class="fw-semibold text-body" th:text="${paymentsPage.number * paymentsPage.size + 1}">1</span>–

        <span class="fw-semibold text-body"

              th:text="${paymentsPage.number * paymentsPage.size + paymentsPage.numberOfElements}">10</span>

        of

        <span class="fw-semibold text-body" th:text="${paymentsPage.totalElements}">0</span>

    </p>

    <ul class="pagination pagination-sm app-pagination__list mb-0"

        th:if="${paymentsPage.totalPages > 1}">

        <li class="page-item" th:classappend="${paymentsPage.first} ? 'disabled'">

            <a class="page-link" th:if="${!paymentsPage.first and employeeId != null}"

               th:href="@{/employees/{id}(id=${employeeId}, paymentPage=${paymentsPage.number - 1}, period=${period}, from=${from}, to=${to})}"

               aria-label="Previous page">

                <i class="bi bi-chevron-left"></i>

            </a>

            <a class="page-link" th:if="${!paymentsPage.first and employeeId == null}"

               th:href="@{/employees(tab=${tab}, paymentPage=${paymentsPage.number - 1}, period=${period}, from=${from}, to=${to}, q=${q})}"

               aria-label="Previous page">

                <i class="bi bi-chevron-left"></i>

            </a>

        </li>

        <li class="page-item" th:each="pageNum : ${#numbers.sequence(0, paymentsPage.totalPages - 1)}"

            th:classappend="${pageNum == paymentsPage.number} ? 'active'">

            <a class="page-link" th:if="${employeeId != null}"

               th:href="@{/employees/{id}(id=${employeeId}, paymentPage=${pageNum}, period=${period}, from=${from}, to=${to})}"

               th:text="${pageNum + 1}"

               th:attr="aria-current=${pageNum == paymentsPage.number} ? 'page' : null"></a>

            <a class="page-link" th:if="${employeeId == null}"

               th:href="@{/employees(tab=${tab}, paymentPage=${pageNum}, period=${period}, from=${from}, to=${to}, q=${q})}"

               th:text="${pageNum + 1}"

               th:attr="aria-current=${pageNum == paymentsPage.number} ? 'page' : null"></a>

        </li>

        <li class="page-item" th:classappend="${paymentsPage.last} ? 'disabled'">

            <a class="page-link" th:if="${!paymentsPage.last and employeeId != null}"

               th:href="@{/employees/{id}(id=${employeeId}, paymentPage=${paymentsPage.number + 1}, period=${period}, from=${from}, to=${to})}"

               aria-label="Next page">

                <i class="bi bi-chevron-right"></i>

            </a>

            <a class="page-link" th:if="${!paymentsPage.last and employeeId == null}"

               th:href="@{/employees(tab=${tab}, paymentPage=${paymentsPage.number + 1}, period=${period}, from=${from}, to=${to}, q=${q})}"

               aria-label="Next page">

                <i class="bi bi-chevron-right"></i>

            </a>

        </li>

    </ul>

</nav>

</body>

</html>
