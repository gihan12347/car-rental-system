<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:with="pageTitle='Service overdue'">
<head th:replace="~{fragments/head :: commonHead}"></head>
<body class="app-body">
<div class="d-flex min-vh-100 app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{fragments/nav-offcanvas :: navOffcanvas}"></div>
    <div class="app-content flex-grow-1 overflow-auto d-flex flex-column">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        <main class="container-fluid py-3 py-lg-4 px-3 px-lg-5 flex-grow-1 app-main">
            <header class="app-page-header mb-3 mb-lg-4">
                <h1 class="h2 mb-1">Service overdue</h1>
                <p class="lead mb-0">Vehicles past their scheduled next service km.</p>
            </header>

            <div class="app-card-table" th:if="${!alerts.isEmpty()}">
                <div class="table-responsive">
                    <table class="table app-table mb-0 align-middle">
                        <thead>
                        <tr>
                            <th>Vehicle</th>
                            <th>Registration</th>
                            <th class="text-end">Odometer</th>
                            <th class="text-end">Due at</th>
                            <th class="text-end">Over by</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="a : ${alerts}">
                            <td class="fw-semibold" th:text="${a.displayName}">—</td>
                            <td th:text="${a.registrationNumber}"></td>
                            <td class="text-end text-nowrap" th:text="|${a.mileageKm} km|"></td>
                            <td class="text-end text-nowrap" th:text="|${a.nextServiceKm} km|"></td>
                            <td class="text-end text-nowrap text-danger fw-semibold"
                                th:text="|${a.kmOverdue} km|"></td>
                            <td class="text-end">
                                <a class="btn btn-sm btn-outline-soft" th:href="@{/cars/{id}(id=${a.carId})}">View</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="empty-state app-card-table p-4 text-center" th:if="${alerts.isEmpty()}">
                <i class="bi bi-check-circle text-success fs-2"></i>
                <p class="fw-semibold mb-1 mt-2">All clear</p>
                <p class="small text-muted mb-3">No vehicles are overdue for service.</p>
                <a class="btn btn-outline-soft" th:href="@{/cars}">Back to fleet</a>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/modals :: appModals}"></div>
</body>
</html>
