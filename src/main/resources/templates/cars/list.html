<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:with="pageTitle='Fleet'">
<head th:replace="~{fragments/head :: commonHead}"></head>
<body class="app-body cars-page">
<div class="d-flex min-vh-100 app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{fragments/nav-offcanvas :: navOffcanvas}"></div>
    <div class="app-content flex-grow-1 overflow-auto d-flex flex-column">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        <main class="container-fluid py-3 py-lg-4 px-3 px-lg-5 flex-grow-1 app-main">
            <div th:if="${successMessage}" class="alert app-alert alert-success d-flex align-items-center gap-2">
                <i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert app-alert alert-danger d-flex align-items-center gap-2">
                <i class="bi bi-exclamation-circle-fill"></i><span th:text="${errorMessage}"></span>
            </div>

            <header class="app-page-header mb-3 mb-lg-4">
                <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 gap-md-3">
                    <div>
                        <h1 class="h2 mb-1">Fleet</h1>
                        <p class="lead mb-0">Manage vehicles, pricing, and availability.</p>
                    </div>
                    <button type="button" class="btn btn-app-primary d-inline-flex align-items-center justify-content-center gap-2 flex-shrink-0"
                            data-app-open-modal="#newCarModal">
                        <i class="bi bi-plus-lg"></i> Add vehicle
                    </button>
                </div>
            </header>

            <div th:replace="~{fragments/page-search :: pageSearch(@{/cars}, 'Registration, status, mileage…')}"></div>

            <div th:replace="~{fragments/record-lists :: carRecordList(${cars}, ${searchQuery}, ${carDeleteSummaries})}"></div>

            <div class="app-card-table app-card-table--fleet d-none d-xl-block" th:if="${!cars.isEmpty()}">
                    <table class="table app-table app-table--fleet mb-0">
                        <colgroup>
                            <col class="fleet-col-vehicle"/>
                            <col class="fleet-col-mileage"/>
                            <col class="fleet-col-passengers"/>
                            <col class="fleet-col-rates"/>
                            <col class="fleet-col-extras"/>
                            <col class="fleet-col-status"/>
                            <col class="fleet-col-actions"/>
                        </colgroup>
                        <thead>
                        <tr>
                            <th>Vehicle</th>
                            <th>Mileage</th>
                            <th class="text-center">Psg</th>
                            <th>Rates / day</th>
                            <th>Extras</th>
                            <th>Status</th>
                            <th class="text-end fleet-table-actions-col">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${cars}">
                            <td>
                                <div class="fleet-vehicle-two-line">
                                    <span class="fleet-vehicle-two-line__image">
                                        <img th:if="${c.imagePath != null and !c.imagePath.isEmpty()}"
                                             class="car-avatar car-avatar--sm"
                                             th:src="${c.imagePath}" alt=""/>
                                        <span th:if="${c.imagePath == null or c.imagePath.isEmpty()}"
                                              class="car-avatar car-avatar--sm car-avatar--placeholder">
                                            <i class="bi bi-car-front"></i>
                                        </span>
                                    </span>
                                    <span class="fleet-vehicle-two-line__reg"
                                          th:text="${c.registrationNumber}"></span>
                                </div>
                            </td>
                            <td class="fleet-mileage-cell">
                                <span class="fleet-mileage-cell__value" th:text="${c.mileageKm}"></span>
                                <span class="fleet-mileage-cell__unit">km</span>
                            </td>
                            <td class="text-center" th:text="${c.passengerCount}"></td>
                            <td class="fleet-hire-rates-cell">
                                <div th:replace="~{fragments/fleet-hire-rates :: hireRatesDisplay(${c})}"></div>
                            </td>
                            <td class="fleet-extras-cell">
                                <span class="fleet-extras-cell__line">
                                    <span class="fleet-extras-cell__value" th:text="${c.extraPricePerKm}"></span>
                                    <span class="fleet-extras-cell__unit">/ km</span>
                                </span>
                                <span class="fleet-extras-cell__line">
                                    <span class="fleet-extras-cell__value" th:text="${c.extraPricePerHour}"></span>
                                    <span class="fleet-extras-cell__unit">/ hr</span>
                                </span>
                            </td>
                            <td>
                                <span class="badge badge-status fleet-status-badge" th:classappend="${c.status.name() == 'AVAILABLE'} ? ' text-bg-success' : ' text-bg-secondary'"
                                      th:text="${c.status}"></span>
                            </td>
                            <td class="text-end fleet-table-actions-col">
                                <div class="fleet-table-actions" role="group" aria-label="Vehicle actions">
                                    <a class="fleet-table-actions__btn fleet-table-actions__btn--view"
                                       th:href="@{/cars/{id}(id=${c.id})}"
                                       title="View profile">
                                        <i class="bi bi-eye" aria-hidden="true"></i>
                                        <span>View</span>
                                    </a>
                                    <a class="fleet-table-actions__btn fleet-table-actions__btn--edit"
                                       th:href="@{/cars/{id}/edit(id=${c.id})}"
                                       title="Edit vehicle">
                                        <i class="bi bi-pencil-square" aria-hidden="true"></i>
                                        <span>Edit</span>
                                    </a>
                                    <button type="button"
                                            class="fleet-table-actions__btn fleet-table-actions__btn--edit text-danger border-danger"
                                            data-bs-toggle="modal"
                                            data-bs-target="#appConfirmDeleteModal"
                                            title="Delete vehicle and linked records"
                                            data-app-confirm
                                            data-app-confirm-title="Delete vehicle"
                                            data-app-confirm-summary="vehicle"
                                            th:attr="data-app-confirm-subject=${c.registrationNumber},
                                                     data-app-confirm-count-rentals=${carDeleteSummaries[c.id].rentalCount},
                                                     data-app-confirm-count-maintenance=${carDeleteSummaries[c.id].maintenanceCount},
                                                     data-app-confirm-action=@{/cars/{id}/delete(id=${c.id})},
                                                     data-app-confirm-param-q=${searchQuery},
                                                     data-app-confirm-loading='Removing vehicle and linked records…'">
                                        <i class="bi bi-trash" aria-hidden="true"></i>
                                        <span>Delete</span>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
            </div>

            <div class="app-card-table empty-state"
                 th:if="${cars.isEmpty() and (searchQuery == null or #strings.isEmpty(searchQuery))}">
                <i class="bi bi-car-front"></i>
                <p class="fw-semibold mb-1">No vehicles yet</p>
                <p class="small mb-3">Add your first car to get started.</p>
                <button type="button" class="btn btn-app-primary" data-app-open-modal="#newCarModal">
                    <i class="bi bi-plus-lg me-1"></i> Add vehicle
                </button>
            </div>
            <div class="app-card-table empty-state"
                 th:if="${cars.isEmpty() and searchQuery != null and !#strings.isEmpty(searchQuery)}">
                <i class="bi bi-search"></i>
                <p class="fw-semibold mb-1">No matching vehicles</p>
                <p class="small mb-3">Try a different registration, status, or mileage.</p>
                <a class="btn btn-outline-soft" th:href="@{/cars}">Clear search</a>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/modals :: appModals}"></div>
</body>
</html>
