<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:with="pageTitle='Account'">
<head th:replace="~{fragments/head :: commonHead}"></head>
<body class="app-body account-page">
<div class="d-flex min-vh-100 app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{fragments/nav-offcanvas :: navOffcanvas}"></div>
    <div class="app-content flex-grow-1 overflow-auto d-flex flex-column">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        <main class="container-fluid py-3 py-lg-4 px-3 px-lg-5 flex-grow-1 app-main account-main">
            <div th:if="${successMessage}" class="alert app-alert alert-success d-flex align-items-center gap-2">
                <i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert app-alert alert-danger d-flex align-items-center gap-2">
                <i class="bi bi-exclamation-circle-fill"></i><span th:text="${errorMessage}"></span>
            </div>

            <header class="app-page-header account-header mb-4">
                <div class="account-header__row">
                    <div>
                        <h1 class="h2 mb-1">Account</h1>
                        <p class="lead mb-0">Change your password or add a new sign-in user for FleetDesk.</p>
                    </div>
                    <span class="account-user-pill d-none d-lg-inline-flex align-items-center gap-2" sec:authorize="isAuthenticated()">
                        <i class="bi bi-person-circle" aria-hidden="true"></i>
                        <span sec:authentication="name" th:text="${currentUsername}">user</span>
                    </span>
                </div>
            </header>

            <div class="account-layout">
                <section class="app-form-card account-section account-section--password p-4 p-lg-5 d-flex flex-column">
                    <div class="account-section__head mb-4 flex-shrink-0">
                        <span class="account-section__icon d-inline-flex align-items-center justify-content-center rounded-3">
                            <i class="bi bi-key" aria-hidden="true"></i>
                        </span>
                        <div>
                            <h2 class="h5 mb-1">Change your password</h2>
                            <p class="small text-muted mb-0 d-lg-none">
                                Signed in as <strong sec:authentication="name" th:text="${currentUsername}">user</strong>
                            </p>
                            <p class="small text-muted mb-0 d-none d-lg-block">Update the password for your current session.</p>
                        </div>
                    </div>
                    <form id="changePasswordForm" class="account-section__form d-flex flex-column flex-grow-1"
                          method="post" th:action="@{/account/password}"
                          th:object="${changePasswordForm}" novalidate>
                            <th:block th:replace="~{fragments/csrf :: csrfField}"></th:block>
                            <div class="mb-3">
                                <label class="form-label" for="currentPassword">Current password</label>
                                <input class="form-control" type="password" id="currentPassword" autocomplete="current-password"
                                       th:field="*{currentPassword}" required/>
                                <div class="invalid-feedback d-block small" th:if="${#fields.hasErrors('currentPassword')}"
                                     th:errors="*{currentPassword}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="newPassword">New password</label>
                                <input class="form-control" type="password" id="newPassword" autocomplete="new-password"
                                       th:field="*{newPassword}" required minlength="6"/>
                                <div class="form-text">At least 6 characters.</div>
                                <div class="invalid-feedback d-block small" th:if="${#fields.hasErrors('newPassword')}"
                                     th:errors="*{newPassword}"></div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label" for="confirmNewPassword">Confirm new password</label>
                                <input class="form-control" type="password" id="confirmNewPassword" autocomplete="new-password"
                                       th:field="*{confirmPassword}" required minlength="6"/>
                            </div>
                    <div class="account-section__actions mt-auto pt-2">
                        <button type="submit" class="btn btn-primary" id="changePasswordSubmitBtn" disabled>
                            Update password
                        </button>
                    </div>
                        </form>
                </section>

                <section class="app-form-card account-section account-section--create p-4 p-lg-5 d-flex flex-column">
                    <div class="account-section__head mb-4 flex-shrink-0">
                        <span class="account-section__icon account-section__icon--create d-inline-flex align-items-center justify-content-center rounded-3">
                            <i class="bi bi-person-plus" aria-hidden="true"></i>
                        </span>
                        <div>
                            <h2 class="h5 mb-1">Create new user</h2>
                            <p class="small text-muted mb-0">Adds another username that can sign in to FleetDesk.</p>
                        </div>
                    </div>
                    <form id="createUserForm" class="account-section__form d-flex flex-column flex-grow-1"
                          method="post" th:action="@{/account/users}"
                          th:object="${createUserForm}" novalidate>
                            <th:block th:replace="~{fragments/csrf :: csrfField}"></th:block>
                            <div class="mb-3">
                                <label class="form-label" for="newUsername">Username</label>
                                <input class="form-control" type="text" id="newUsername" autocomplete="username"
                                       th:field="*{username}" required minlength="3" maxlength="64"/>
                                <div class="invalid-feedback d-block small" th:if="${#fields.hasErrors('username')}"
                                     th:errors="*{username}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="createUserPassword">Password</label>
                                <input class="form-control" type="password" id="createUserPassword" autocomplete="new-password"
                                       th:field="*{password}" required minlength="6"/>
                                <div class="form-text">At least 6 characters.</div>
                                <div class="invalid-feedback d-block small" th:if="${#fields.hasErrors('password')}"
                                     th:errors="*{password}"></div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label" for="createUserConfirmPassword">Confirm password</label>
                                <input class="form-control" type="password" id="createUserConfirmPassword" autocomplete="new-password"
                                       th:field="*{confirmPassword}" required minlength="6"/>
                            </div>
                    <div class="account-section__actions mt-auto pt-2">
                        <button type="submit" class="btn btn-primary" id="createUserSubmitBtn" disabled>
                            Create user
                        </button>
                    </div>
                        </form>
                </section>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/modals :: appModals}"></div>
<script th:src="@{/js/account-forms.js}" defer></script>
</body>
</html>
